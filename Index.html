<!DOCTYPE html>
<html>

<head>

<title>AI Chatbot</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Customer Service Chatbot</h1>

<div class="button-group">
<button onclick="toggleDarkMode()">Dark Mode</button>
<button onclick="clearChat()">Clear Chat</button>
</div>

<div id="chatBox"></div>

<input type="text"
id="userInput"
placeholder="Type your message..."
onkeypress="handleEnter(event)">

<button onclick="reply()">Send</button>

</div>

<script>

window.onload = function(){

let savedChat =
localStorage.getItem("chatData");

if(savedChat){

document.getElementById("chatBox")
.innerHTML = savedChat;

}

let savedTheme =
localStorage.getItem("theme");

if(savedTheme === "dark"){

document.body.classList.add("dark");

}

let chatBox =
document.getElementById("chatBox");

chatBox.innerHTML +=
"<div class='bot'>Hello! Welcome to customer support.</div>";

}

function handleEnter(event){

if(event.key === "Enter"){

reply();

}

}

function reply(){

let time =
new Date().toLocaleTimeString();

let userTime =
"<small>" + time + "</small>";

let botTime =
"<small>" + time + "</small>";

let hour =
new Date().getHours();

let input =
document.getElementById("userInput")
.value
.trim()
.toLowerCase();

if(input === ""){

return;

}

let response = "";

if(input.includes("order")){

response = "Your order is on the way.";

}

else if(input.includes("payment")){

response = "Payment was successful.";

}

else if(input.includes("cancel")){

response = "Your order has been cancelled.";

}

else if(input.includes("delivery")){

response = "Delivery will arrive within 2 days.";

}

else if(input.includes("refund")){

response = "Refund takes 5 days.";

}

else if(input.includes("help")){

response = "Please explain your issue.";

}

else if(input.includes("thank")){

response = "You're welcome!";

}

else if(input.includes("bye")){

response = "Thank you for visiting. Have a nice day!";

}

else if(input.includes("hello") || input.includes("hi")){

if(hour < 12){

response = "Good Morning! How can I help you?";

}

else if(hour < 18){

response = "Good Afternoon! How can I help you?";

}

else{

response = "Good Evening! How can I help you?";

}

}

else{

response = "Sorry, I don't understand.";

}

let chatBox =
document.getElementById("chatBox");

chatBox.innerHTML +=
"<div class='user'>" +
input + "<br>" +
userTime +
"</div>";

chatBox.innerHTML +=
"<div class='bot typing' id='typing'>Typing...</div>";

chatBox.scrollTop =
chatBox.scrollHeight;

setTimeout(function(){

let typing =
document.getElementById("typing");

if(typing){

typing.remove();

}

chatBox.innerHTML +=
"<div class='bot'>" +
response + "<br>" +
botTime +
"</div>";

localStorage.setItem(
"chatData",
chatBox.innerHTML
);

chatBox.scrollTop =
chatBox.scrollHeight;

},1000);

// clear input

document.getElementById("userInput").value = "";

}

function clearChat(){

document.getElementById("chatBox")
.innerHTML = "";

localStorage.removeItem("chatData");

}

function toggleDarkMode(){

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){

localStorage.setItem(
"theme",
"dark"
);

}

else{

localStorage.setItem(
"theme",
"light"
);

}

}

</script>

</body>

</html>
